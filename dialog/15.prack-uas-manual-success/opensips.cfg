log_level = 4
xlog_level = 4
stderror_enabled = yes

udp_workers = 1
auto_aliases = no

socket = udp:192.168.52.1:5060

mpath="/usr/lib/x86_64-linux-gnu/opensips/modules/"

loadmodule "signaling.so"
loadmodule "sl.so"

loadmodule "tm.so"
modparam("tm", "fr_timeout", 5)
modparam("tm", "fr_inv_timeout", 30)
modparam("tm", "restart_fr_on_each_reply", 0)
modparam("tm", "onreply_avp_mode", 1)

loadmodule "sipmsgops.so"
loadmodule "cfgutils.so"

loadmodule "maxfwd.so"

loadmodule "rr.so"
modparam("rr", "append_fromtag", 0)

loadmodule "dialog.so"

loadmodule "proto_udp.so"

route {
	if (!mf_process_maxfwd_header(10)) {
		send_reply(483, "Too Many Hops");
		exit;
	}

	if (has_totag()) {
		if (is_method("PRACK")) {
			if (!loose_route() && !match_dialog()) {
				xlog("prack-uas-manual-success: PRACK did not match any dialog\n");
				send_reply(404, "Not here");
				exit;
			}

			xlog("prack-uas-manual-success: matched PRACK for dialog <$DLG_did>, stored rseq=<$dlg_val(rseq)>, pending=<$dlg_val(rseq_pending)>, RAck=<$hdr(RAck)>\n");
			if ($(hdr(RAck){s.select,0, }) != $dlg_val(rseq) ||
			$(hdr(RAck){s.select,1, }) != "1" ||
			$(hdr(RAck){s.select,2, }) != "INVITE") {
				xlog("prack-uas-manual-success: invalid RAck for dialog <$DLG_did>\n");
				send_reply(400, "Bad RAck");
				exit;
			}

			$dlg_val(rseq_pending) = 0;
			xlog("prack-uas-manual-success: PRACK accepted for dialog <$DLG_did>, pending=<$dlg_val(rseq_pending)>\n");
			send_reply(200, "OK");
			exit;
		}

		if (is_method("ACK") && t_check_trans()) {
			t_relay();
			exit;
		}

		if (!loose_route() && !match_dialog()) {
			send_reply(404, "Not here");
			exit;
		}

		if (!t_relay())
			send_reply(500, "Internal Error");
		exit;
	}

	if (is_method("CANCEL")) {
		if (t_check_trans())
			t_relay();
		exit;
	}

	if (!is_method("INVITE")) {
		send_reply(503, "Service Unavailable");
		exit;
	}

	if (!create_dialog()) {
		send_reply(500, "Internal Server Error");
		exit;
	}

	if (!record_route()) {
		send_reply(500, "Internal Server Error");
		exit;
	}

	t_on_reply("uas_prack");

	if (!t_relay())
		send_reply(500, "Internal Error");
	exit;
}

onreply_route[uas_prack] {
	$var(rseq) = NULL;

	if ($rs < 101 || $rs >= 200)
		return;
	if (!is_present_hf("Require"))
		append_hf("Require: 100rel\r\n");
	else if (!list_hdr_has_option("Require", "100rel"))
		list_hdr_add_option("Require", "100rel");

	if (!is_present_hf("RSeq")) {
		$var(rseq) = $RANDOM % 2000000000;
		append_hf("RSeq: $var(rseq)\r\n");
		xlog("prack-uas-manual-success: generated RSeq <$var(rseq)> for provisional reply $rs on dialog <$DLG_did>\n");
	} else {
		$var(rseq) = $(hdr(RSeq){s.select,0, });
		xlog("prack-uas-manual-success: preserving upstream RSeq <$var(rseq)> for provisional reply $rs on dialog <$DLG_did>\n");
	}

	$dlg_val(rseq) = $var(rseq);
	$dlg_val(rseq_pending) = 1;
	xlog("prack-uas-manual-success: stored dialog state for <$DLG_did>: rseq=<$dlg_val(rseq)>, pending=<$dlg_val(rseq_pending)>\n");
}

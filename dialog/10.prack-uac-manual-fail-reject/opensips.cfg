log_level = 4
xlog_level = 4
stderror_enabled = yes

udp_workers = 1
auto_aliases = no

socket = udp:192.168.52.1:5060

mpath="/usr/lib/x86_64-linux-gnu/opensips/modules/"

loadmodule "signaling.so"
loadmodule "sl.so"

loadmodule "tm.so"
modparam("tm", "fr_timeout", 5)
modparam("tm", "fr_inv_timeout", 30)
modparam("tm", "restart_fr_on_each_reply", 0)
modparam("tm", "onreply_avp_mode", 1)

loadmodule "mi_script.so"

loadmodule "sipmsgops.so"

loadmodule "maxfwd.so"

loadmodule "rr.so"
modparam("rr", "append_fromtag", 0)

loadmodule "dialog.so"

loadmodule "proto_udp.so"

route {
	if (!mf_process_maxfwd_header(10)) {
		send_reply(483, "Too Many Hops");
		exit;
	}

	if (has_totag()) {
		if (is_method("ACK") && t_check_trans()) {
			t_relay();
			exit;
		}

		if (!loose_route() && !match_dialog()) {
			send_reply(404, "Not here");
			exit;
		}

		if (!t_relay())
			send_reply(500, "Internal Error");
		exit;
	}

	if (is_method("CANCEL")) {
		if (t_check_trans())
			t_relay();
		exit;
	}

	if (!is_method("INVITE")) {
		send_reply(503, "Service Unavailable");
		exit;
	}

	if (!create_dialog()) {
		send_reply(500, "Internal Server Error");
		exit;
	}

	if (!record_route()) {
		send_reply(500, "Internal Server Error");
		exit;
	}

	t_on_reply("manual_prack");

	if (!t_relay())
		send_reply(500, "Internal Error");
	exit;
}

onreply_route[manual_prack] {
	if (!($rs >= 101 and $rs < 200))
		return;
	if (!list_hdr_has_option("Require", "100rel"))
		return;

	xlog("manual_prack: got provisional reply $rs/$rr for INVITE tid <$T_id>, sending local PRACK\n");

	if (!dlg_send_sequential("PRACK", "callee", "", "", "X-TID: $T_id\r\n"))
		xlog("failed to build local PRACK request\n");
}

local_route {
	if (!is_method("PRACK"))
		return;

	xlog("local_route: caught local PRACK with R-URI <$ru>\n");

	if ($hdr(X-TID) == NULL || $hdr(X-TID) == "")
	{
		xlog("local_route: PRACK has no X-TID helper header, skipping failure correlation\n");
		return;
	}

	$avp(prack_tid) = $hdr(X-TID);
	$avp(prack_totag) = $tt;
	xlog("local_route: extracted X-TID <$avp(prack_tid)>, to-tag <$avp(prack_totag)>\n");
	remove_hf("X-TID");
	xlog("local_route: removed X-TID helper header before sending PRACK downstream\n");
	$T_fr_timeout = 2;
	t_on_failure("prack_failed");
	xlog("local_route: armed PRACK failure route with fr_timeout=2s\n");
}

failure_route[prack_failed] {
	xlog("failure_route[prack_failed]: PRACK transaction failed, stored INVITE tid: <$avp(prack_tid)>, to-tag <$avp(prack_totag)>, last code <$T_reply_code>\n");

	$avp(mi_param) = NULL;
	$avp(mi_value) = NULL;

	$avp(mi_param) = "code";
	$avp(mi_value) = "502";
	$avp(mi_param) = "reason";
	$avp(mi_value) = "Bad Gateway";
	$avp(mi_param) = "trans_id";
	$avp(mi_value) = $avp(prack_tid);
	$avp(mi_param) = "to_tag";
	$avp(mi_value) = $avp(prack_totag);

	xlog("failure_route[prack_failed]: issuing MI t_reply(502, Bad Gateway) for INVITE tid <$avp(prack_tid)>\n");

	if (!mi("t_reply", $var(mi_ret), $avp(mi_param), $avp(mi_value)))
		xlog("MI t_reply failed: $var(mi_ret)\n");
	else
		xlog("failure_route[prack_failed]: MI t_reply succeeded: $var(mi_ret)\n");
}

log_level = 4
xlog_level = 4
stderror_enabled = yes

udp_workers = 1
auto_aliases = no

socket = udp:192.168.52.1:5060

mpath="/usr/lib/x86_64-linux-gnu/opensips/modules/"

loadmodule "signaling.so"
loadmodule "sl.so"

loadmodule "tm.so"
modparam("tm", "fr_timeout", 10)
modparam("tm", "fr_inv_timeout", 30)
modparam("tm", "restart_fr_on_each_reply", 0)
modparam("tm", "onreply_avp_mode", 1)

loadmodule "mi_script.so"
loadmodule "sipmsgops.so"
loadmodule "maxfwd.so"

loadmodule "rr.so"
modparam("rr", "append_fromtag", 0)

loadmodule "dialog.so"

loadmodule "proto_udp.so"

route {
	if (!mf_process_maxfwd_header(10)) {
		send_reply(483, "Too Many Hops");
		exit;
	}

	if (has_totag()) {
		if (is_method("ACK") && t_check_trans()) {
			t_relay();
			exit;
		}

		if (!loose_route() && !match_dialog()) {
			send_reply(404, "Not here");
			exit;
		}

		if (is_method("UPDATE")) {
			if (!t_newtran()) {
				send_reply(500, "Internal Error");
				exit;
			}

			xlog("update-interworking: caught inbound UPDATE tid <$T_id>, to-tag <$tt>, ct=<$ct>\n");

			if (!dlg_send_sequential("INVITE", "caller", $rb, $ct,
			"X-TID: $T_id\r\nX-TOTAG: $tt\r\n")) {
				xlog("update-interworking: failed to send opposite-leg re-INVITE for UPDATE tid <$T_id>\n");
				t_reply(500, "Interworking Failed");
			}

			exit;
		}

		if (!t_relay())
			send_reply(500, "Internal Error");
		exit;
	}

	if (is_method("CANCEL")) {
		if (t_check_trans())
			t_relay();
		exit;
	}

	if (!is_method("INVITE")) {
		send_reply(503, "Service Unavailable");
		exit;
	}

	if (!create_dialog("auto-prack")) {
		send_reply(500, "Internal Server Error");
		exit;
	}

	if (!record_route()) {
		send_reply(500, "Internal Server Error");
		exit;
	}

	if (!t_relay())
		send_reply(500, "Internal Error");
	exit;
}

local_route {
	if (!is_method("INVITE"))
		return;

	if ($hdr(X-TID) == NULL || $hdr(X-TOTAG) == NULL)
		return;

	$avp(update_tid) = $hdr(X-TID);
	$avp(update_totag) = $hdr(X-TOTAG);
	$avp(update_did) = $DLG_did;
	xlog("update-interworking: local re-INVITE built for UPDATE tid <$avp(update_tid)>, to-tag <$avp(update_totag)>, did <$avp(update_did)>\n");
	remove_hf("X-TID");
	remove_hf("X-TOTAG");
	xlog("update-interworking: stripped helper headers from local re-INVITE\n");
	t_on_reply("update_iw_reply");
	t_on_failure("update_iw_fail");
}

onreply_route[update_iw_reply] {
	if ($avp(update_tid) == NULL || $avp(update_totag) == NULL)
		return;

	if ($(hdr(CSeq){s.select,1, }) != "INVITE")
		return;

	xlog("update-interworking: got reply $rs to local re-INVITE for UPDATE tid <$avp(update_tid)>\n");

	if ($rs < 200 || $rs >= 300)
		return;

	$avp(mi_param) = NULL;
	$avp(mi_value) = NULL;
	$avp(mi_param) = "code";
	$avp(mi_value) = "200";
	$avp(mi_param) = "reason";
	$avp(mi_value) = "OK";
	$avp(mi_param) = "trans_id";
	$avp(mi_value) = $avp(update_tid);
	$avp(mi_param) = "to_tag";
	$avp(mi_value) = $avp(update_totag);

	xlog("update-interworking: replying 200 OK to original UPDATE tid <$avp(update_tid)>\n");

	if (!mi("t_reply", $var(mi_ret), $avp(mi_param), $avp(mi_value)))
		xlog("update-interworking: MI t_reply failed: $var(mi_ret)\n");
	else
		xlog("update-interworking: MI t_reply succeeded: $var(mi_ret)\n");
}

failure_route[update_iw_fail] {
	if ($avp(update_tid) == NULL || $avp(update_totag) == NULL)
		return;

	xlog("update-interworking: local re-INVITE failed with code <$T_reply_code> for UPDATE tid <$avp(update_tid)>\n");

	$avp(mi_param) = NULL;
	$avp(mi_value) = NULL;
	$avp(mi_param) = "code";
	$avp(mi_value) = "503";
	$avp(mi_param) = "reason";
	$avp(mi_value) = "Service Unavailable";
	$avp(mi_param) = "trans_id";
	$avp(mi_value) = $avp(update_tid);
	$avp(mi_param) = "to_tag";
	$avp(mi_value) = $avp(update_totag);

	xlog("update-interworking: replying 503 to original UPDATE tid <$avp(update_tid)>\n");

	if (!mi("t_reply", $var(mi_ret), $avp(mi_param), $avp(mi_value)))
		xlog("update-interworking: MI t_reply failed: $var(mi_ret)\n");
	else
		xlog("update-interworking: MI t_reply succeeded: $var(mi_ret)\n");

	if ($avp(update_did) == NULL || $avp(update_did) == "") {
		xlog("update-interworking: no dialog did available, skipping dialog termination\n");
		return;
	}

	xlog("update-interworking: terminating dialog <$avp(update_did)> after UPDATE failure\n");

	if (!mi("dlg_end_dlg $avp(update_did)", $var(mi_ret)))
		xlog("update-interworking: MI end_dlg failed: $var(mi_ret)\n");
	else
		xlog("update-interworking: MI end_dlg succeeded: $var(mi_ret)\n");
}

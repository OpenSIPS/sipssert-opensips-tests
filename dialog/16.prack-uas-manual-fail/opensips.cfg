log_level = 4
xlog_level = 4
stderror_enabled = yes

udp_workers = 1
auto_aliases = no

socket = udp:192.168.52.1:5060

mpath="/usr/lib/x86_64-linux-gnu/opensips/modules/"

loadmodule "signaling.so"
loadmodule "sl.so"

loadmodule "tm.so"
modparam("tm", "fr_timeout", 5)
modparam("tm", "fr_inv_timeout", 30)
modparam("tm", "restart_fr_on_each_reply", 0)
modparam("tm", "onreply_avp_mode", 1)

loadmodule "mi_script.so"
loadmodule "sipmsgops.so"
loadmodule "cfgutils.so"

loadmodule "maxfwd.so"

loadmodule "rr.so"
modparam("rr", "append_fromtag", 0)

loadmodule "dialog.so"

loadmodule "proto_udp.so"

route {
	if (!mf_process_maxfwd_header(10)) {
		send_reply(483, "Too Many Hops");
		exit;
	}

	if (has_totag()) {
		if (is_method("PRACK")) {
			if (!loose_route() && !match_dialog()) {
				xlog("prack-uas-manual-fail: PRACK did not match any dialog\n");
				send_reply(404, "Not here");
				exit;
			}

			xlog("prack-uas-manual-fail: matched PRACK for dialog <$DLG_did>, stored rseq=<$dlg_val(rseq)>, pending=<$dlg_val(rseq_pending)>, RAck=<$hdr(RAck)>\n");
			if ($(hdr(RAck){s.select,0, }) != $dlg_val(rseq) ||
			$(hdr(RAck){s.select,1, }) != "1" ||
			$(hdr(RAck){s.select,2, }) != "INVITE") {
				xlog("prack-uas-manual-fail: invalid RAck for dialog <$DLG_did>\n");
				send_reply(400, "Bad RAck");
				exit;
			}

			$dlg_val(rseq_pending) = 0;
			xlog("prack-uas-manual-fail: PRACK accepted for dialog <$DLG_did>, pending=<$dlg_val(rseq_pending)>\n");
			send_reply(200, "OK");
			exit;
		}

		if (is_method("ACK") && t_check_trans()) {
			t_relay();
			exit;
		}

		if (!loose_route() && !match_dialog()) {
			send_reply(404, "Not here");
			exit;
		}

		if (!t_relay())
			send_reply(500, "Internal Error");
		exit;
	}

	if (is_method("CANCEL")) {
		if (t_check_trans())
			t_relay();
		exit;
	}

	if (!is_method("INVITE")) {
		send_reply(503, "Service Unavailable");
		exit;
	}

	if (!create_dialog()) {
		send_reply(500, "Internal Server Error");
		exit;
	}

	if (!record_route()) {
		send_reply(500, "Internal Server Error");
		exit;
	}

	t_on_reply("uas_prack");

	if (!t_relay())
		send_reply(500, "Internal Error");
	exit;
}

onreply_route[uas_prack] {
	$var(rseq) = NULL;

	if ($rs < 101 || $rs >= 200)
		return;
	if (!is_present_hf("Require"))
		append_hf("Require: 100rel\r\n");
	else if (!list_hdr_has_option("Require", "100rel"))
		list_hdr_add_option("Require", "100rel");

	if (!is_present_hf("RSeq")) {
		$var(rseq) = $RANDOM % 2000000000;
		append_hf("RSeq: $var(rseq)\r\n");
		xlog("prack-uas-manual-fail: generated RSeq <$var(rseq)> for provisional reply $rs on dialog <$DLG_did>\n");
	} else {
		$var(rseq) = $(hdr(RSeq){s.select,0, });
		xlog("prack-uas-manual-fail: preserving upstream RSeq <$var(rseq)> for provisional reply $rs on dialog <$DLG_did>\n");
	}

	$dlg_val(rseq) = $var(rseq);
	$dlg_val(rseq_pending) = 1;
	$dlg_val(inv_tid) = $T_id;
	$dlg_val(inv_totag) = $tt;
	$dlg_val(self_did) = $DLG_did;
	xlog("prack-uas-manual-fail: stored dialog state for <$DLG_did>: rseq=<$dlg_val(rseq)>, pending=<$dlg_val(rseq_pending)>, tid=<$dlg_val(inv_tid)>\n");

	if ($dlg_val(prack_watchdog_armed) == NULL) {
		$dlg_val(prack_watchdog_armed) = 1;
		xlog("prack-uas-manual-fail: arming 2-second PRACK watchdog for dialog <$DLG_did>\n");
		launch(sleep(2), prack_watchdog, "$DLG_did");
	}
}

route[prack_watchdog] {
	if (!load_dialog_ctx("$param(1)", "did")) {
		xlog("prack-uas-manual-fail: watchdog could not load dialog context for DID <$param(1)>\n");
		return;
	}

	xlog("prack-uas-manual-fail: watchdog fired for DID <$DLG_did>, pending=<$dlg_val(rseq_pending)>, tid=<$dlg_val(inv_tid)>\n");
	if ($dlg_val(rseq_pending) == 0) {
		xlog("prack-uas-manual-fail: dialog <$DLG_did> already cleared pending PRACK state\n");
		unload_dialog_ctx();
		return;
	}

	if ($dlg_val(inv_tid) == NULL || $dlg_val(inv_totag) == NULL) {
		xlog("prack-uas-manual-fail: watchdog could not recover INVITE correlation data for DID <$DLG_did>\n");
		unload_dialog_ctx();
		return;
	}

	xlog("prack-uas-manual-fail: watchdog rejecting INVITE tid <$dlg_val(inv_tid)> with to-tag <$dlg_val(inv_totag)> due to missing PRACK\n");

	$avp(mi_param) = NULL;
	$avp(mi_value) = NULL;
	$avp(mi_param) = "code";
	$avp(mi_value) = "504";
	$avp(mi_param) = "reason";
	$avp(mi_value) = "PRACK Timeout";
	$avp(mi_param) = "trans_id";
	$avp(mi_value) = $dlg_val(inv_tid);
	$avp(mi_param) = "to_tag";
	$avp(mi_value) = $dlg_val(inv_totag);

	if (!mi("t_reply", $var(mi_ret), $avp(mi_param), $avp(mi_value)))
		xlog("prack-uas-manual-fail: MI t_reply failed: $var(mi_ret)\n");
	else
		xlog("prack-uas-manual-fail: MI t_reply succeeded: $var(mi_ret)\n");

	unload_dialog_ctx();
}
